瓷瓶弗令泄氣臨時用麻油調搽如濕處則乾摻神效無比暗治飲新方治婦人陰蝕又名紝瘡當歸五錢白芍三錢茯苓三錢炒梔子錢半柴胡八分海螵蛸二錢即烏賊骨水煎服逍遙八物湯新方治同前證人參二錢柴胡一錢白芍三錢歸身三錢海螵蛸三錢山藥三錢茯苓三錢甘草一錢生肉桂隨宜加用水煎服溻癢湯治同前證蛇床子一兩川椒三錢白礬三錢水煎乘熱熏之溫則洗之數日即愈其效如神宜珍之仙遺糧湯治楊梅毒瘡土茯苓一兩金銀花五錢薏仁二錢殭蠶二錢宣木瓜二錢白蘚皮一錢木通一錢肥皂核去殼七粒按別録載用皂角子亦其類也水煎服無論久近輕重潰爛穿頂及誤用輕粉致害者悉能治之忌食諸物未載升氣去濕湯治腳氣下注人參三錢白朮三錢黃耆一兩生防風一錢肉桂一錢薏仁五錢芡實五錢陳皮五分柴胡一錢茯苓五錢半夏二錢制水煎服顧足湯治同前證黃耆一兩生薏仁一兩芡實五錢白朮一兩茯苓五錢肉桂五分防風五分車前子五錢白芥子三錢水煎服順導湯新方治腳氣衝心此證狀類傷寒切勿誤治茯苓五錢澤瀉五錢肉桂三分木瓜一錢吳茱萸一錢車前子三錢水煎服全趾飲新方治足趾療毒趾亦作指淮牛膝三錢鮮石斛三錢金銀花一兩元參五錢甘菊花五錢當歸五錢茯苓三錢生甘草二錢水煎服托裡完趾湯新方治前證已潰人參二錢黃耆五錢生遠志三錢去心金銀花一兩茯苓三錢牛膝三錢叉石斛三錢水煎服扶正驅邪散新方治孕婦足腫一名子氣非水也俟分娩後勿藥亦愈白朮二錢當歸二錢人參一錢香附一錢炒烏藥一錢木瓜一錢茯苓一錢陳皮五分紫蘇五分甘草五分炙用生薑三片水煎服如脾氣虛弱者宜後方補中益氣湯加減補中益氣湯治同前證人參五錢白朮五錢當歸三錢生黃耆三錢甘草五分生柴胡一錢升麻三分陳皮三分茯苓一兩水煎服陽和湯治孕婦陰疽熟地一兩護胎聖藥鹿角膠三錢白芥子二錢甘草一錢生上猺桂一錢炮薑五分以上二味本草注明墮胎得熟地陰藥以護之斷無傷胎之患經所謂有故無殞是也麻黃五分水煎服一馬某妻尹氏孕才三月腋患一疽皮色如常延豫診之脈遲而弱此陰寒沉困之候議用前湯治之馬某駭曰婦人重身輒用麻黃髮表及薑桂熱藥得毋有礙於胎乎余曰有故無殞何必過慮某曾猶豫莫決即另延數醫皆曰以保胎為主薑桂大非所宜竟襲安胎之劑與服直至腰痠腹痛胎動不安復延豫診閲其前醫方案而戒之曰藥與病相違何能濟事仍令服陽和湯一劑胎安五劑膿潰十劑痊愈內經所謂治病必求其本洵哉斯言消癰護産湯新方治産後癰毒當歸一兩川芎五錢金銀花五錢蒲公英三錢荊芥一錢生甘草二錢水煎服回陽救産湯新方治産後陰疽人參三錢當歸一兩川芎五錢荊芥一錢上猺桂一錢益母草三錢水煎服大溫中飲莊在田治痘後陰疽經云痘稟於陰而成於陽譬之種豆必賴天氣陽和地上溫暖而後發生人身之痘亦猶是也痘之將出全仗真陽托送斯時總宜培補氣血疏通經絡毒氣盡化為膿痘後無餘毒矣痘師不明此理皆謂涼藥可以解毒豈知痘乃胎中陰毒得陽氣則行得涼藥則滯毒氣因涼藥留滯於肌肉之間痘後所以發為大疽名曰痘毒皮色不變者居多當以此方治之其色紅而帶紫者用荊防地黃湯愈之然陰證多陽證少痘後並未見有陽證之毒也熟地五錢冬朮三錢山藥三錢西黨參三錢生黃耆二錢白芥子一錢原方用柴胡恐其清利故易之甘草一錢生上猺桂一錢炮薑五分淨麻黃五分水煎服一小兒痘後滿頭潰爛名曰虛陽貫頂又曰發疸清膿血水經年不愈此乃出痘時誤服涼藥中宮受寒陽無所依上衝頭頂譬之火爐中以水潑之則熱氣必上衝其理一也宜用大溫中飲與大補元煎相間服之引火歸元十劑可愈大補元煎方未載荊防地黃湯莊在田治痘後癰毒此證不多見方亦備參熟地四錢山藥二錢丹皮一錢茯苓一錢山萸肉一錢荊芥一錢防風一錢甘草一錢生水煎服解毒至神湯新方治漆瘡腫腐木形人每患此證元參二錢知母二錢石膏二錢連翹二錢牛蒡子二錢大黃二錢生枳殼一錢川連六分甘草八分生淡竹葉二十片水煎服如火甚者加芒硝又方治同前證白果樹葉芒硝亦可煎湯洗浴立刻消腫倘愈後不守禁忌瘡疤復萌變為頑瘋癬癩者急用旱蓮草一名醴腸如前洗數次亦愈忌浴熱水兼戒口味為要潑火湯新方治湯火灼傷當歸五錢丹皮三錢生地五錢甘草一錢地榆三錢槐花二錢茯苓五錢水煎服或用白蘿蔔搗取自然汁童便亦可串服如傷重便祕者再加生軍五錢倘山居僻陬倉卒無藥止飲蘿蔔汁亦效昔有錦衣楊永興廚下夜遭回祿凡睡此房者或已死或將死灌以生蘿蔔汁良久悉愈其效如斯特録祛痛散治同前證地榆研細末用麻油調敷傷處若遇已破即以乾末摻上立效如神或生大黃末用桐油調敷亦可又方治同前證生鴉片即烏煙敷之立刻清涼止痛有人被火藥燒傷百藥不效後用此方而愈勝靈丹治金瘡出血龍眼核去黑皮研極細末摻之即止血定痛收口為金瘡第一藥也西平氏云此藥系西秦巴里坤營中救愈多人按龍眼核治金刃傷之功效甚驗查本草綱目及別集本草俱未記載可知世間有用之材自古迄今湮沒者不可勝計矣惜哉二妙膏治同前證或跌磕出血功效甚速並無留瘀之弊白蠟一兩藤黃三錢上用麻油四兩溶化塗傷處立愈此方定痛止血及湯火傷皆效腳跟擦破亦治玉真散治破傷中風是證也因破傷皮肉被風邪襲入經絡初起寒熱交作牙關緊急甚則角弓反張口吐涎沫傷處變為干陷其毒內攻使然當以此方治之如或不效用奪命飲下之使風從大便而出庶幾得生矣南星薑汁炒防風白芷天蟲即殭蠶炒斷絲上藥等分研極細末每服三錢童便和好酒調下或改作煎劑亦可取其湯者蕩也凡跌打損傷內有瘀血者亦效奪命飲新方治同前證當歸二錢白芷二錢殭蠶二錢炒明天麻二錢蟬蛻二錢大黃五錢桃仁二十粒羌活二錢防風一錢南星錢半制麻黃五分水煎服甚者五劑痊愈如未愈去大黃再服外以清和膏蓋之地榆敗毒散沈雨蒼治中癲犬毒癲犬之患大抵自驚蟄後蛇蟲出洞霜降後蛇蟲入洞出必吁氣入必吸氣吐納之毒氣常留於洞口犬性喜嗅其毒從口鼻吸入遂發癲名猘犬頸硬頭低耳垂尾彈直向前行不返身顧後若人觸其毒急則七日發作緩則七七日或至百日發作卒病心腹痛神識不清痛極無聊自咬肌肉甚至嚼瓷器衣服慘狀難言欲辨是證用蒲扇向病人重掮見風即身縮戰栗畏懼又或鳴鑼聞聲亦驚惕不安皆其驗也西黨參三錢羌活三錢獨活三錢柴胡三錢前胡三錢甘草三錢茯苓三錢枳殼二錢炒用撫芎二錢桔梗二錢生地榆一兩紫竹根一把生薑三片水煎服歲道光丙午冬路經湘潭見米船夥卒病心復剜痛煩躁欲死百藥罔效醫亦不識何疾適同舟醴陵客以蒲扇向病人一掮大呼曰殆哉此癲犬略發乃死證也速用地榆敗毒散大劑濃煎如牙關緊閉以烏梅肉擦之自開急灌一劑而神識清再劑其病若失此目擊經驗者據醴客云凡遇癲犬不及趨避或被咬銜衣即中毒氣但覺畏風情形或在七日進藥一劑如病人頭上有紅髮宜拔去之至二七日嚼生黃豆如口覺腥味心惡欲嘔是毒已淨不必再服否則必有留毒未淨急再進一劑至三七日仍用豆照前嚼試服至三劑留毒盡化為膿血從大便而出永保無虞孕婦亦可服捷徑方治同前證萬年青此花盆內多栽之其葉闊約一二寸高約八九寸老而且厚者是也連根搗取汁服一二碗許即腹中毒氣已成血塊從大便出無論久近皆效一切不忌亦仙方也俗謂産小狗此無稽之論不足信也祛毒散治毒蛇咬傷白芷五錢麥冬一兩去心水煎服滓敷傷處雖垂死者亦活此蛇咬第一方也鄰村丁全齡被毒蛇咬傷臂腫如股少刻身脹黃黑色勢已瀕危照此方煎湯灌之覺腹中聲響惡水自傷口流出腫消神清次日全愈豫乃記之每治蛇咬多驗百順膏新方治癰疽發背及一切無名腫毒初起者消已潰者愈並頑惡疔瘡輒皆奇效誠瘍科之寶藥也大蝦蟆二隻即老蟾酥多者佳木芙蓉葉三兩重陽日採用或根皮或花俱妙上藥用麻油一斤照常熬枯濾去渣將油稱準凡藥油二兩入炒過鉛粉一兩如數派算以桑枝攪勻熬至滴水取丸不黏指為度按別録載滴水成珠一説不可執為定法恐膏過老耳傾入水中去火性凡遇頑惡爛瘡先用蔥椒湯洗淨貼之既善拔膿又能止痛且易生肌也此豫獨得之祕百發百中故取義百順愈後立誓戒食蝦蟆並刊送勸善録若干部以抵物命庶不負陰隲也貞庵氏又識清和膏新方治癰疽發背及陰陽不和等毒初起能活血定痛散瘀消腫潰後即拔膿去腐生肌長肉誠外科之祕方也木芙蓉五兩重陽日採葉或根皮或花俱妙紫荊皮三兩獨活二兩南星兩半赤芍兩半白芷一兩上藥用麻油二斤熬枯濾去渣將油再熬沸徐徐投入炒飛黃丹一斤或鉛粉亦可按別録皆云熬至滴水成珠方下黃丹非是今依許楣君據占法校正以桑枝攪勻至滴水取丸不黏指為度傾入水中去火性攤用靈應膏新方治癰疽發背及一切潰爛等瘡功能長肉生肌收口誠外科之妙藥也象皮陸錢切片穿山甲六錢男子發一兩二錢牛蒡草三兩血竭二錢兒茶二錢白膠香四錢即藝香去油研末上藥用麻油二斤將象皮山甲男發牛蒡草煎枯濾去渣將油稱準凡藥油一斤入炒飛黃丹八兩攪勻熬至滴水取丸不黏指為度離火再入血竭兒茶藝香等末攪勻傾水中去火性臨用重湯燉攤紫金膏新方治癰疽發背後對口大毒潰爛不堪洞見內膜者膿出如蟹吐沫者是膜破也不治用此填塞瘡孔即能拔毒去肌收口誠瘍科之要藥也當歸二兩白芷五錢癩蝦蟆一隻眼紅腹無八字紋者勿用牛蒡草三兩根莖葉上藥用麻油一斤浸五日入銅杓內慢火熬至藥枯瀝去渣將油再熬沸下白蠟二兩溶化次下血竭四錢研末攪勻離火半冷再下白膠香四錢去油研末攪成膏收儲瓷器浸水中三日拔去火性聽用愈陳愈佳凡瘡口深陷以新棉絮蘸塗此膏塞之仍食調補氣血內服藥餌隔蒜灸法治一切癰疽惡瘡先宜對證服托裡煎劑免致火毒內攻獨頭蒜切片約二文錢厚安瘡頭上用艾壯灸之若瘡發勢大以蒜搗爛攤患處將艾鋪上燒之蒜敗再易不計壯數總要痛者灸至不痛不痛者灸至痛為止凡癰疽諸瘡皆因寒邪客於經絡營衛壅遏不行以致寒熱相搏用艾蒜灸之一使毒氣解散二使好肉不壞三瘡口易斂直一舉而三善備矣李迅曰癰疽者灸勝於用藥但頭上及腰旁陷中皆當禁忌恐以火濟火反貽害也歌曰瘍科隔蒜灸稱奇頭屬六陽腰屬腎傳與醫人莫浪施此為禁忌總宜知洗心滌慮良方治不忠不孝無仁無義恨天怨地謗聖毀賢瞞心昧己刻剝成家刁唆爭訟向背乖宜妒人親近妄説是非逞凶橫行恃勢凌善及一切姦盜邪淫等證依方修治無不應驗孝順十分陰隲全用恩惠隨施慎言一味仔細十分忠直一塊安分時用戒淫去心仁義廣用老實一個好心一片小心一點戒賭洗淨信行全用和氣一團方便不拘多少熱腸一條忍耐百個上藥用心細研加波羅蜜為丸如菩提子大隨時引用益友三個平心湯徐徐溫服切忌笑里刀暗中箭平地風波歲光緒丙子春豫往杭州採藥偶憩西陵路亭見貼應驗良方一張載云其方來自化人府勸人縣靈山會上大藏經中專治一切性情之病惜其字頗殘缺因揭歸每於缺處補以己意特附卷末仰體先哲一片婆心以博濟於元窮也然則後之閲是方者更當何如樂善耶又豫之所厚望也然則後之閲是方者更當何如樂善耶又豫之所厚望也貞庵氏謹識歌曰紫府仙人授寶方洗心滌慮養真湯世間用得諸般藥萬禍千災化吉祥
