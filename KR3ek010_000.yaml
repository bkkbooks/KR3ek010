front:
  text: 裘序醫之道下儕於藝上通乎儒與天地權生息之機為國家培治與之本責甚重焉事甚難焉內科然外科亦何獨不然余先嚴以儒理究心方脈頗行世粵孽既清後命余旁通醫術謂可全己全人爾時云程思渴喜習科舉文未遑讀刀圭書遂不果迄今年近甲録席帽依然二十年來走俗抗塵毫無寸進惟是間覽方書學范文正公之存心不取值不誇功求診者亦絡繹戶外至談醫則不敢知誠重之也誠難之也張君貞庵世業儒上承祖硯積學能文行醫非其志緣母氏患臀疽外症遂習外科雖未必擅湔腸刮骨之能著理腦解顱之效而五行明理六氣辨淫膏丹精潔應手即瘥董仙之名頗譟有時採托前賢之精義考驗心得之元微自成一家言以儒為醫析理若鏡名曰外科醫鏡謂鏡吾之得失焉可即謂鏡人之死生焉亦無不可夫祕術不宣者庸醫之窄量也著書行世者良醫之苦心也張君玉字親編金針暗度雖僅寸鱗片爪而回春妙手已見一斑余縱不習見張君之醫明鏡不疲屢照而即此為母學醫孝也以醫濟世仁也仁孝性成其視余之重拂親心老大而仍不知醫者相去何如耶書既成將付剞劂問序於余夫余之於是科固東坡所云扣槃捫燭者也烏乎序然張君既抱道而隱於醫對症檢方高懸醫鏡倪日廣其所傳以作救世慈航行見消疹氣之流行躋斯民於仁壽必有不僅以醫名世者是編特其嚆矢焉耳余之敏樂援筆而為之序時光緒癸未季秋下浣歲進士候選訓導侍生裘光照日林氏題贈自序子不幸幼失怙承大父訓習舉業思以儒自見歲戊午秋慈親患臀疽診之諸方家悉急外治於本原上並不究心綿延幾一歲不能效母氏頗憤甚顧謂豫曰若輩誤我兒其干此事無使患是者受母苦余思醫不任醫猶誤人於此則儒不任儒其誤天下當如何耶遂危儒術從母命日萃靈素內典下逮百家諸書凡外形者必洞其內蘊於虛實陰陽母少昧後散施其技於人人往往得少治余故檢經驗數過者無論古所有今所創悉裒成一帙簽之曰醫鏡蓋實欲自鏡其得失焉豫客春患咯血瀕危奉母氏祝天發願公是書遂霍然愈余意病適當愈耳不則必母氏誠感也豈天竟欲使豫以此術見邪余於是書固不吝特恐余之誤人不自知者轉使人復誤人也則與向之業儒不任儒卒以誤天下也何異余是以躊躇至今也適宋君子云見之力勸余成母志今因自署其顛末竊又願世之不余誤者並能匡余所誤焉幸甚時光緒癸未仲秋清河貞庵氏書於剡山麓之鶴年堂
