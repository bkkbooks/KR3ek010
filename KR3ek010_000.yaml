body:
  text: 癰疽提綱內經曰諸痛癢瘡皆屬於心蓋心主血而行氣氣血凝滯而發毒治宜先辨陰陽若腫焮痛甚煩渴飲冷發熱便閉脈洪數而實者為陽證雖嚴冬必用清涼以解熱毒若不腫不痛脈細惡寒嘔吐不食泄瀉盜汗四肢厥冷是為陰證雖盛夏必用辛熱以助陽氣若微腫微痛似潰不潰時出清膿者為半陰半陽之證亦用辛熱以補胃氣此治法之大要也又有用寒遠寒用熱遠熱假者反之雖違其時必從其證若執常法無不誤矣癰疽二毒陰陽各殊紅癰乃陽實之證氣血熱而毒滯白疽乃陰虛之證氣血寒而毒凝斯二證判若霄壤治法一誤不啻冰炭之相投豫歷閲方書多以癰疽並治矇混之極貽害無窮業是科者可不審諸今將癰疽類方臚列於下癰疽真假例論前篇言陰陽者有表裡虛實寒熱之變雖病情已見其梗概而陰陽之中又有真證假證之辨焉真者陽也皆火毒也而或有似陰之象假者陰也皆寒疽也而或有似陽之象因遇此易疑故再悉其蘊於下瘡口高突作疼止有一點黃頭露形者此真象也瘡口作癢既而變痛今世俗傳説癢變痛謂陰證變陽者非也旁出無數小頭大勢平陂而無高突之狀止現圓圓一線之紅影或脈來急數者此假象也凡患虛甚者脈多數此當以表裡虛實辨陰陽不可因其脈數誤認熱證數與速同膿出紅黃而作痛者真象也膿出不多形色紫黑或瘡口作黯淡之狀不痛不癢者此假象也瘡將收口云蒸霧起肉擁皮皺雖或有膿而黃紅中有膿旁無膿者此真象也坎陷色滯膿少血多兩旁皮膚全無潤澤之氣或外邊皮肉生滿而中央仍復作疼或中不滿而作癢旁反痛者皆假象也降癰活命飲新方治一切癰毒發背及無名等證初起即消已成即潰百發百中此余新定首方也金銀花一兩當歸五錢生黃耆三錢甘草二錢生乳香二錢去油沒藥一錢去油白芷一錢防風七分山甲三片炒黃明膠五錢即牛皮膠用蛤粉拌炒成珠此味較古之蠟礬丸更勝酒水各半煎服托裡散新方治同前證已成未潰者服之不傳惡證人參三錢生黃耆五錢當歸三錢甘草二錢生制乳香一錢制沒藥一錢穿山甲三片炒牛皮膠五錢黃明者佳用牡蠣粉炒成珠酒水煎服托裡散新方治同前證金銀花一兩人參五錢生黃耆五錢黃明膠五錢炒成珠濁臭者勿用甘草三錢生山甲三片炒當歸三錢酒水煎服托裡十宣散新方治同前證外因風寒感冒內因氣血虛損隨至難消難膿難潰者並效人參三錢生黃耆五錢當歸三錢官桂五分川芎八分防風一錢白芷一錢山甲三片炒黃明膠五錢炒珠甘草二錢生酒水煎服轉陽化毒湯新方治前證已潰誤服涼劑傳變陰證者人參五錢黃耆五錢生遠志三錢金銀花一兩生甘草三錢肉桂一錢寒甚倍用黃明膠五錢炒成珠水煎服一孔連茹妻年及四旬背患一毒膿出反疼醫者不解涼劑罔效再加大黃下之變證蜂起延豫診視瘡色灰陷泄瀉不止豫曰潰後臟腑已虧復為誤下所傷耳遂以前方倍用肉桂與服一劑而痛止十劑諸證悉愈陳良甫曰潰後一毫涼毒不可吃朱丹溪又曰補托元氣為主此古法昭然若輩竟置之不論視人命如草菅可慨也補正理癰湯新方治同前證氣血虧損膿水淋漓久而不愈者婦人血脈虛弱尤屬相宜人參三錢當歸三錢炒白朮三錢膿多不斂改用山藥茯苓二錢甘草二錢生黃耆五錢鹽水拌炒肉桂一錢川芎八分熟地五錢牛皮膠五錢炒珠薑引水煎服愈後立誓戒食牛肉切切陽和湯許真君治一切陰疽發背對口流注痰核瘰癧失榮乳岩橫痃附骨石疽等證此第一神方也懷熟地一兩鹿角膠三錢白芥子二錢生甘草一錢本方無此味俗加之上猺桂一錢炮薑五分淨麻黃五分酒水各半煎去滓用鹿角膠化溶和猺桂沖服或隨量再飲酒數杯謹戒房事服至病愈為止無論冬夏皆宜不可妄行增減若體虛極者肉桂炮薑可加一二倍用或加附子更妙按瘍科別録所載陰疽諸方皆不及此存心濟世者宜寶之陽和救急湯新方治前證發背已潰賦稟虛弱或誤服涼劑傳變倒陷不化膿腐垂危等證大熟地一兩鹿角膠三錢白芥子二錢上猺桂二錢附子一二錢炮薑一二錢人參三五錢當歸三錢便溏改用冬朮水煎服如大便溏泄者加北五味二十粒十補保真湯新方治同前證膿血大潰精神耗損或年邁素稟虛弱或涼藥克伐太甚瘡形癟慘陰寒至極等證癟葉匹蔑切音瞥肉枯貌大熟地一兩山藥三錢枸杞三錢山萸肉三錢鹿角膠三錢白芥子二錢人參三五錢當歸三錢便溏者總之或改用冬朮亦可猺桂一二錢附子二三錢水煎服如便泄甚者加補骨脂三錢酒炒固本異功煎新方治同前證潰爛不堪氣血虧損或因涼藥克伐嘔吐泄瀉形狀狼狽危極等證此參天救本之功有難以盡述者也大熟地五錢白朮三錢山藥三錢人參三錢生黃耆三錢枸杞三錢萸肉三錢補骨脂二錢棗仁二錢炒甘草二錢生上猺桂二錢淡附子一錢或加炮薑一錢水煎服陽和二陳湯治濕痰流注耳後陰疽骨槽風乳疽等證少腹緩疽尤驗半夏三錢九制佳廣橘紅三分白芥子二錢骨槽風改用殭蠶茯苓二錢甘草一錢生上猺桂一錢炮薑五分淨麻黃三分水煎服取陽和丸以配二陳湯故名之陽和化堅湯新方治骨槽風證鹿角膠五錢炒殭蠶二錢搜風白芥子二錢甘草一錢生上猺桂一錢炮薑五分麻黃三分酒水煎服陽和救絶湯新方治同前證誤服涼劑致肌肉堅凝腐臭者人參三錢白朮三錢茯苓三錢製半夏三錢廣橘紅三分殭蠶二錢炒甘草一錢生上猺桂一錢炮薑五分淨麻黃三分水煎服茄蒂飲治對口癰毒鮮茄蒂七個白種更佳鮮何首烏一兩水煎服二三劑未成即消已破能拔膿生肌收口雖患盤八九寸大者亦效托裡化毒散新方治同前證鮮何首烏一兩當歸三錢甘草二錢生沒藥一錢乳香一錢茄蒂七個乾者倍用人參三錢黃耆五錢生水煎服敷藥方治同前證活鯽魚一尾去腹雜與鱗百齒霜三錢即婦人篦下發垢或加獨核肥皂一個去核弦筋無則用雄豬眼梢肉亦可共搗爛厚敷患處不論初起已潰留一孔出氣一二日即愈七聖湯新方治對口陰疽俗云落頭疽也人參五錢黃耆五錢生當歸三錢何首烏一兩白芥子二錢上猺桂一錢鹿角膠五錢水煎服扶危固本湯新方治同前證爛延纏頸歷久不愈者大熟地五錢何首烏五錢當歸三錢便溏改用山藥或冬朮亦可人參三錢黃耆三錢生枸杞三錢山萸肉三錢鹿角膠三錢白芥子二錢生甘草二錢上猺桂二錢淡附子二錢炮薑一錢水煎服化毒漏蘆飲新方治喉外生癰與喉內癰同治漏蘆二錢連翹二錢元參二錢牛蒡子二錢大黃隨證酌用生甘草八分犀角一錢此味不可用升麻代之黃芩一錢藍葉或青黛亦可水煎服如腫熱甚加芒硝消瞕救目湯王普三治眼生瞕翳石蟹錢半生研末連翹錢半羚羊角一錢草決明一錢白蒺藜一錢防己一錢茺蔚子一錢龍膽草五分酒炒木賊草五分甘菊花八分水煎服無論胬肉及紅筋白膜雲翳等眼證驗試如神百發百中之祕方也惟體虛者忌服碧雲散治同前證鵝不食草二錢即石胡荽青黛一錢川芎一錢共為細末令患者先含溫水一口將藥少許搐入鼻中或新白布泡水蘸藥入鼻中亦可以淚出為度數次即愈滋陰養目湯治陰虛目痛大熟地五錢山萸肉五錢葳蕤五錢即玉竹枸杞子三錢甘菊花三錢當歸三錢白芍三錢柴胡五分車前子二錢白芥子二錢水煎服經驗方治鼻淵腦漏是證也鼻流濁涕不止名鼻曰淵乃風熱爍腦而液下滲此腎虛之證也經曰腦滲為涕又曰膽移熱於腦原病式曰如以火爍金熱極則化為水然究其原必腎陰虛而不能納氣歸元故火無所畏上迫肺金由是津液之氣不得下降並於孔竅轉為濁涕津液為之逆流矣治當以此方主之刀豆子一名挾劍豆味甘平無毒煅存性為末用酒白湯亦可調服三錢甚者不過三服即愈此方取其納氣歸元而漏自止也參茸地黃湯新方治前證久漏懷熟地一兩山萸肉四錢山藥四錢白茯苓三錢丹皮三錢澤瀉三錢人參二錢鹿茸二錢或用鹿角膠亦可水煎服化疔漏蘆湯新方治鼻內生疔漏蘆錢半白蘞一錢黃芩一錢連翹一錢犀角一錢赤芍一錢桔梗一錢甘草八分生水煎服救唇湯治反唇疔毒紫花地丁一兩金銀花一兩白果二十個去殼桔梗二錢甘草二錢生知母一錢水煎服此方並治頭面口角疔不論已潰未潰皆效化疔救唇湯新方治同前證金銀花五錢鮮生地三錢白果十個去殼桔梗二錢當歸二錢赤芍一錢犀角一錢生甘草一錢水煎服心法曰凡疔生唇上即看腿彎委中穴有紫筋起者急用銀針刺出血亦愈因並録以備參用玉女煎治實火牙痛石膏五錢知母二錢元參二錢生地三錢麥冬三錢水煎服清胃飲新方治同前證元參三錢生地五錢麥冬三錢骨碎補一錢山藥三錢茯苓三錢丹皮二錢天花粉八分水煎服滋陰地黃湯治虛火牙痛大熟地一兩毛薑四錢即骨碎補山藥四錢茯苓三錢牡丹皮三錢澤瀉三錢麥冬三錢北五味一錢肉桂隨宜加用水煎服救舌湯治舌上生癰鮮生地四錢赤芍錢半牡丹皮一錢犀角一錢連翹一錢麥冬一錢黑山梔一錢木通一錢川連六分甘草八分生水煎服消大便閉實加大黃涼血四神煎新方治舌上出血槐花三錢生地四錢丹皮二錢茯苓二錢水煎服此方並治重舌甚效解毒地黃湯新方治上齶懸癰鮮生地四錢功專散血與乾地黃從治稍別赤芍錢半丹皮一錢犀角一錢黃芩一錢黃柏一錢梔子一錢川連六分甘草八分生水煎服荊芥敗毒散任䳄波治時毒喉痛斑疹腮腫藥治風痰咳嗽頭痛發熱等證荊芥錢半防風錢半桔梗錢半赤芍錢半牛蒡子二錢金銀花二錢浙貝母二錢連翹二錢薄荷一錢生甘草八分青果一個水煎服如病勢甚者加羚羊角錢半萬年青一葉腮腫加馬屁勃一錢咳嗽加杏仁三錢痰多加橘紅一錢涼膈散任䳄波治前證內陷三焦受邪者大黃五錢錦文佳芒硝三錢連翹三錢梔子二錢薄荷一錢川連六分甘草八分生水煎服如火甚者加羚羊角或犀角隨宜用之犀角消毒飲任䳄波治同前證喉痛丹疹並項腫如蝦蟆瘟者牛蒡子二錢金銀花二錢連翹二錢梔子二錢荊芥錢半赤芍錢半殭蠶錢半生甘草八分犀角一錢柴胡一錢萬年青一葉水煎服如大便閉結加生大黃四錢利之普濟消毒飲任䳄波治同前證並二便閉結若通利而病勢重者亦宜之羚羊角三錢知母三錢連翹三錢生大黃三錢牛蒡子二錢殭蠶二錢薄荷錢半川連六分馬屁勃八分生甘草八分水煎服如病勢甚者即加犀角錢半大黃倍用或加金汁更妙凡時毒愈後再宜養陰調理兼清涼解毒為主大忌油麵辛辣及一切發物調理方見下調理方任䳄波小生地四錢地骨皮三錢元參三錢生甘草八分白芍二錢麥冬二錢去心丹皮二錢忍冬藤五錢水煎服增補消毒飲治同前證牛蒡子二錢金銀花二錢連翹二錢元參二錢荊芥錢半殭蠶錢半桔梗錢半薄荷一錢板藍根一錢馬屁勃八分生甘草八分水煎服如病甚便祕者去桔梗加生軍三錢即大黃又神方任䳄波治同前證荊芥錢半薄荷錢半連翹二錢蟬退一錢人中黃三錢西湖柳一兩忍冬藤一兩萬年青一葉水煎服一二劑後如病勢不退即加犀角一錢生大黃三錢下之自愈妙不盡述小兒分兩酌量減用鎮陰地黃湯章虛谷治陰火喉痹大熟地一兩山萸肉四錢山藥四錢茯苓三錢丹皮三錢澤瀉三錢淡附子一錢上猺桂一錢淮牛膝三錢牡蠣三錢煅水煎冷服一儒者年甫卅齡病陰虛喉痛諸醫皆用辛涼之藥不效比豫診之其脈沉細而數大便日行二三次豫曰此相